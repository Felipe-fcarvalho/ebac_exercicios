<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contatos</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <div class="containerFlex">
            <img src="images/contato.png" alt="ícone de contato">
            <h1>Agenda de Contatos</h1>
        </div>
        <form id="form-contato">
            <label for="nome-contato">Nome: </label>
            <input type="text" placeholder="Nome" required id="nome-contato">
            <label for="telefone-contato">Telefone: </label>
            <input type="tel" required id="telefone-contato" placeholder="(11) 91234 5678" minlength="8" maxlength="15">
            <button type="submit" id="btn-cadastro">Cadastrar</button>
        </form>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Contato</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    <script src="main.js"></script>
</body>
</html>
